!
! FRR Configuration for r-isp-a (AS200 — ISP A transit)
!
hostname r-isp-a
password zebra
enable password zebra
!
interface eth1
  ip address 100.64.1.2/30
!
interface eth2
  ip address 100.64.3.1/30
!
line vty
!
router bgp 200
  bgp router-id 100.64.1.2
  no bgp ebgp-requires-policy
  neighbor 100.64.1.1 remote-as 100
  neighbor 100.64.3.2 remote-as 300
!
