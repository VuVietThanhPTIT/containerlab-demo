!
! FRR Configuration for r-hq (AS100 — HQ router)
! eBGP đã lên Established cả 2 uplink. Policy chưa cấu hình (TODO).
!
hostname r-hq
password zebra
enable password zebra
!
interface eth1
  ip address 192.168.100.1/24
!
interface eth2
  ip address 100.64.1.1/30
!
interface eth3
  ip address 100.64.2.1/30
!
line vty
!
router bgp 100
  bgp router-id 100.64.1.1
  no bgp ebgp-requires-policy
  neighbor 100.64.1.2 remote-as 200
  neighbor 100.64.2.2 remote-as 400
  !
  address-family ipv4 unicast
    network 192.168.100.0/24
  exit-address-family
!
! TODO: cấu hình Local Preference + prefix-list tại đây
! - ip prefix-list DC-PREFIXES seq 10 permit 192.168.200.0/24
! - route-map SET-LP-ISP-A permit 10
!     match ip address prefix-list DC-PREFIXES
!     set local-preference 200
! - route-map SET-LP-ISP-A permit 20
!     (fallthrough — cho phép route khác đi qua với LP mặc định)
! - áp route-map inbound cho neighbor ISP-A:
!     neighbor 100.64.1.2 route-map SET-LP-ISP-A in
!
