!
! FRR Configuration for r-as300 (AS300)
!
hostname r-as300
password zebra
enable password zebra
!
interface eth1
  ip address 100.64.1.2/30
!
interface eth2
  ip address 192.168.30.1/24
!
line vty
!
router bgp 300
  bgp router-id 100.64.1.2
  no bgp ebgp-requires-policy
  neighbor 100.64.1.1 remote-as 200
  !
  address-family ipv4 unicast
    network 192.168.30.0/24
  exit-address-family
!
