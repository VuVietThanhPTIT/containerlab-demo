!
! FRR Configuration for r-as200 (AS200 — transit)
! Config trông hoàn chỉnh — đã có filter route vào/ra "cho an toàn"
!
hostname r-as200
password zebra
enable password zebra
!
interface eth1
  ip address 100.64.0.2/30
!
interface eth2
  ip address 100.64.1.1/30
!
line vty
!
! Prefix-list "cho phép" route từ AS100
ip prefix-list FROM-AS100 seq 10 permit 192.168.1.0/24
!
route-map FILTER-IN-AS100 permit 10
  match ip address prefix-list FROM-AS100
!
router bgp 200
  bgp router-id 100.64.0.2
  no bgp ebgp-requires-policy
  neighbor 100.64.0.1 remote-as 100
  neighbor 100.64.1.2 remote-as 300
  !
  address-family ipv4 unicast
    neighbor 100.64.0.1 route-map FILTER-IN-AS100 in
  exit-address-family
!
